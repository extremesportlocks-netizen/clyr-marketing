<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="c_left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#A7F3D0"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="c_right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F8FAFB"/>
      <stop offset="100%" stop-color="#E2E7EB"/>
    </linearGradient>
    <linearGradient id="c_high" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.75)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </linearGradient>
    <radialGradient id="c_floor" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="420" rx="130" ry="14" fill="url(#c_floor)"/>

  <g transform="translate(200,260) rotate(-15) translate(-200,-260)">
    <!-- right half -->
    <rect x="200" y="220" width="120" height="80" rx="40" ry="40" fill="url(#c_right)"/>
    <!-- left half -->
    <rect x="80" y="220" width="125" height="80" rx="40" ry="40" fill="url(#c_left)"/>
    <!-- joining line -->
    <line x1="200" y1="222" x2="200" y2="298" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    <!-- highlight -->
    <rect x="80" y="220" width="240" height="80" rx="40" ry="40" fill="url(#c_high)"/>

    <!-- imprint -->
    <text x="140" y="266" font-family="DM Sans, sans-serif" font-size="14" font-weight="700" letter-spacing="3" text-anchor="middle" fill="#FFFFFF">
      CLY<tspan fill="#00B4C5">R</tspan>
    </text>
    <text x="260" y="266" font-family="DM Sans, sans-serif" font-size="9" font-weight="600" letter-spacing="2" text-anchor="middle" fill="#6B7C8A">
      MEB+IVM
    </text>
  </g>
</svg>