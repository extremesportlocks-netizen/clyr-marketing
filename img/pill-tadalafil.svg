<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="p_pill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="p_high" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.75)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.05)"/>
    </linearGradient>
    <radialGradient id="p_floor" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="430" rx="130" ry="14" fill="url(#p_floor)"/>

  <!-- main pill (large oval, two-tone capsule style) -->
  <g transform="translate(200,260) rotate(-12) translate(-200,-260)">
    <rect x="80" y="200" width="240" height="120" rx="60" ry="60" fill="url(#p_pill)"/>
    <rect x="80" y="200" width="120" height="120" rx="60" ry="60" fill="#FFFFFF"/>
    <line x1="200" y1="210" x2="200" y2="310" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
    <rect x="80" y="200" width="240" height="120" rx="60" ry="60" fill="url(#p_high)"/>

    <!-- imprint -->
    <text x="140" y="266" font-family="DM Sans, sans-serif" font-size="14" font-weight="700" letter-spacing="3" text-anchor="middle" fill="#00B4C5">
      CLY<tspan fill="#1A1A1A">R</tspan>
    </text>
    <text x="260" y="266" font-family="DM Sans, sans-serif" font-size="11" font-weight="600" letter-spacing="2" text-anchor="middle" fill="#FFFFFF" opacity="0.95">
      TAD 2.5
    </text>
  </g>
</svg>