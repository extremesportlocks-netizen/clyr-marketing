<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <defs>
    <radialGradient id="g_gummy" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#FB923C" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#C2410C" stop-opacity="0.95"/>
    </radialGradient>
    <radialGradient id="g_shine" cx="0.3" cy="0.2" r="0.4">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="g_floor" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="rgba(0,0,0,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="430" rx="120" ry="14" fill="url(#g_floor)"/>

  <!-- gummy bear shape -->
  <g transform="translate(110,140)">
    <!-- ears -->
    <ellipse cx="50" cy="22" rx="20" ry="22" fill="url(#g_gummy)"/>
    <ellipse cx="130" cy="22" rx="20" ry="22" fill="url(#g_gummy)"/>
    <!-- head -->
    <ellipse cx="90" cy="65" rx="55" ry="50" fill="url(#g_gummy)"/>
    <!-- body -->
    <ellipse cx="90" cy="170" rx="78" ry="90" fill="url(#g_gummy)"/>
    <!-- arms -->
    <ellipse cx="20" cy="135" rx="22" ry="35" fill="url(#g_gummy)" transform="rotate(-25 20 135)"/>
    <ellipse cx="160" cy="135" rx="22" ry="35" fill="url(#g_gummy)" transform="rotate(25 160 135)"/>
    <!-- legs -->
    <ellipse cx="50" cy="255" rx="26" ry="40" fill="url(#g_gummy)"/>
    <ellipse cx="130" cy="255" rx="26" ry="40" fill="url(#g_gummy)"/>

    <!-- shine -->
    <ellipse cx="70" cy="50" rx="30" ry="40" fill="url(#g_shine)"/>

    <!-- imprint -->
    <text x="90" y="190" font-family="DM Sans, sans-serif" font-size="20" font-weight="700" letter-spacing="2" text-anchor="middle" fill="#00B4C5" opacity="0.9">
      CLY<tspan fill="#FFFFFF">R</tspan>
    </text>
    <text x="90" y="210" font-family="DM Sans, sans-serif" font-size="10" font-weight="600" letter-spacing="2" text-anchor="middle" fill="#FFFFFF" opacity="0.85">
      SIL 50
    </text>
  </g>
</svg>