<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 480" fill="none">
  <defs>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#e8f7f8" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#b8e8ec" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="gel" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#00B4C5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7fe8df" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f4f7f8"/>
      <stop offset="50%" stop-color="#c5d0d6"/>
      <stop offset="100%" stop-color="#8fa3ad"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0d1b2e" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#shadow)">
    <!-- pump head -->
    <rect x="168" y="24" width="64" height="42" rx="10" fill="url(#chrome)" stroke="#9eb4be" stroke-width="1.5"/>
    <rect x="188" y="8" width="24" height="22" rx="6" fill="url(#chrome)" stroke="#9eb4be" stroke-width="1.2"/>
    <ellipse cx="200" cy="66" rx="34" ry="8" fill="#dfe9ec" opacity="0.9"/>
    <!-- glass bottle -->
    <path d="M142 74 h116 c8 0 14 6 14 14 v250 c0 28 -24 50 -54 50 h-36 c-30 0 -54 -22 -54 -50 V88 c0 -8 6 -14 14 -14z" fill="url(#glass)" stroke="#9fd9de" stroke-width="2"/>
    <path d="M152 120 h96 v180 c0 18 -16 32 -36 32 h-24 c-20 0 -36 -14 -36 -32 V120z" fill="url(#gel)"/>
    <!-- reflections -->
    <path d="M158 95 v290" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
    <path d="M248 110 v250" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <!-- label -->
    <rect x="155" y="250" width="90" height="88" rx="8" fill="#ffffff" fill-opacity="0.82" stroke="#00B4C5" stroke-width="1.2"/>
    <text x="200" y="278" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="11" font-weight="700" fill="#007a8b" letter-spacing="1.2">CLYR</text>
    <text x="200" y="298" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="15" font-weight="800" fill="#0d1b2e" letter-spacing="0.5">TRI GEL</text>
    <text x="200" y="316" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="8" font-weight="600" fill="#6b7c8a">50g · Airless pump</text>
    <text x="200" y="330" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="7.5" font-weight="600" fill="#00B4C5">CLYR Health</text>
  </g>
</svg>