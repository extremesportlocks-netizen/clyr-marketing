<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 560" fill="none" role="img" aria-label="GHK-Cu 3% prescription cream 30g">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1210"/>
      <stop offset="55%" stop-color="#2a1f1a"/>
      <stop offset="100%" stop-color="#0f1a22"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4c9a8"/>
      <stop offset="45%" stop-color="#c9784a"/>
      <stop offset="100%" stop-color="#8b4f2a"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#f8f4f0" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#e8ddd4" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f7f8"/>
      <stop offset="100%" stop-color="#b8c5cc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#00B4C5" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#c9784a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="480" height="560" rx="32" fill="url(#bg)"/>
  <ellipse cx="240" cy="300" rx="180" ry="200" fill="url(#glow)"/>
  <g class="orbit" opacity="0.55">
    <circle cx="240" cy="260" r="120" stroke="#c9784a" stroke-width="1" stroke-dasharray="4 8" fill="none" opacity="0.4"/>
    <circle cx="360" cy="260" r="6" fill="#00B4C5"/>
    <circle cx="120" cy="260" r="5" fill="#f4c9a8"/>
    <circle cx="240" cy="140" r="4" fill="#c9784a"/>
    <circle cx="240" cy="380" r="4" fill="#00B4C5"/>
  </g>
  <g filter="url(#soft)">
    <rect x="188" y="88" width="104" height="36" rx="18" fill="url(#cap)" stroke="#9eb4be" stroke-width="1.2"/>
    <rect x="148" y="120" width="184" height="340" rx="28" fill="url(#glass)" stroke="url(#copper)" stroke-width="2.5"/>
    <rect x="168" y="150" width="144" height="270" rx="18" fill="#fff" fill-opacity="0.82"/>
    <path d="M172 138 v300" stroke="#fff" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
    <rect x="178" y="220" width="124" height="120" rx="12" fill="#fff" fill-opacity="0.92" stroke="#00B4C5" stroke-width="1.5"/>
    <text x="240" y="252" text-anchor="middle" font-family="DM Sans,Arial,sans-serif" font-size="11" font-weight="700" fill="#007a8b">CLYR</text>
    <text x="240" y="276" text-anchor="middle" font-family="DM Sans,Arial,sans-serif" font-size="15" font-weight="800" fill="#1a1210">GHK-Cu 3%</text>
    <text x="240" y="296" text-anchor="middle" font-family="DM Sans,Arial,sans-serif" font-size="9" font-weight="600" fill="#6b5a50">Copper Peptide Cream</text>
    <text x="240" y="314" text-anchor="middle" font-family="DM Sans,Arial,sans-serif" font-size="8.5" font-weight="600" fill="#8b4f2a">30 mg/g · 30 g</text>
    <circle cx="240" cy="200" r="14" fill="url(#copper)" opacity="0.9"/>
    <text x="240" y="205" text-anchor="middle" font-family="DM Sans,Arial,sans-serif" font-size="10" font-weight="800" fill="#fff">Cu</text>
  </g>
  <text x="240" y="500" text-anchor="middle" font-family="Instrument Serif,Georgia,serif" font-size="22" font-style="italic" fill="#f4c9a8" opacity="0.9">Prescription strength</text>
