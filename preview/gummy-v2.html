<style>
*{box-sizing:border-box}
body{font-family:-apple-system,Segoe UI,sans-serif;background:#eef1f5;margin:0;padding:36px;color:#12233f}

.row{display:flex;gap:24px;flex-wrap:wrap}
.col{flex:1;min-width:320px;max-width:560px}

.tile{background:#fff;border-radius:14px;width:110px;height:110px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(20,30,50,0.08);overflow:hidden}
.tile img{max-width:70%;max-height:70%;object-fit:contain;filter:drop-shadow(0 6px 10px rgba(20,30,50,0.15))}
.tile.dark{background:#101724}
